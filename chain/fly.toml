# chain/fly.toml — Fly.io app configuration for the leerie-chain orchestrator.
#
# Unlike the repo-root fly.toml (one ephemeral Machine per leerie run, no HTTP
# listener, min_machines_running=0), this app is a *persistent* HTTP service:
#
#   - Always-on: min_machines_running=1 so the machine is ready to receive
#     Fly webhook callbacks when a worker Machine exits.
#   - HTTP service: exposes the /chains and /webhooks/fly endpoints at
#     internal port 8080 (the chain.server default).
#   - Persistent volume: SQLite chain state lives at /data/chain.db on a
#     Fly volume that survives machine restarts.
#
# Provision once per user:
#   fly launch --config chain/fly.toml --dockerfile chain/Dockerfile \
#     --name leerie-chain --region iad --no-deploy
#   fly volumes create chain_data --region iad --size 1 --app leerie-chain
#   fly secrets set GH_DISPATCH_PAT=... FLY_API_TOKEN=... \
#     CHAIN_WEBHOOK_SECRET=... --app leerie-chain
#   fly deploy --config chain/fly.toml --app leerie-chain

app            = "leerie-chain"
primary_region = "iad"

[build]
  dockerfile = "chain/Dockerfile"

# Small VM: the chain orchestrator is I/O-bound (HTTP + SQLite + flyctl
# API calls), not compute-bound. 1 shared CPU and 512 MB is sufficient.
[vm]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 512

# Persistent: keep one Machine running at all times so Fly webhook
# callbacks are received immediately when a worker Machine exits.
[deploy]
  strategy             = "immediate"
  min_machines_running = 1
  auto_stop_machines   = "off"
  auto_start_machines  = false

# HTTP service: the chain API and webhook receiver listen on port 8080.
# force_https ensures Fly's edge TLS-terminates inbound connections.
[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/chains"
    timeout      = "5s"

# Persistent volume for the SQLite chain state DB.
# Create with: fly volumes create chain_data --region iad --size 1 --app leerie-chain
# The server writes to /data/chain.db (CHAIN_DB_PATH env default).
[mounts]
  source      = "chain_data"
  destination = "/data"
